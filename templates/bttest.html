<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body>
<h2>BT Test</h2>
<button onclick="navigator.bluetooth.requestDevice({acceptAllDevices:true}).then(function(d){alert('OK: '+d.name);}).catch(function(e){alert('FOUT: '+e.name+' '+e.message);})">Test Bluetooth</button>
</body>
</html>
