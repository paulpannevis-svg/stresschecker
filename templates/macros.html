{% macro youtube_embed(video_id, title='') -%}
<div class="video-wrapper">
  <iframe src="https://www.youtube-nocookie.com/embed/{{ video_id }}?rel=0&modestbranding=1&playsinline=1&cc_load_policy=1"
          title="{{ title|e }}"
          frameborder="0"
          allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          loading="lazy"></iframe>
</div>
{%- endmacro %}
