<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VB Demo — StressChecker Pro Event</title>
  <style>
    body{font-family:system-ui,Arial,sans-serif;background:#f6f4f0;margin:0;color:#222}
    .wrap{max-width:380px;margin:8vh auto;padding:0 16px}
    .card{background:#fff;border:1px solid #ece7df;border-radius:12px;padding:24px}
    h1{font-size:18px;margin:0 0 4px}
    p.sub{color:#888;font-size:13px;margin:0 0 18px}
    label{display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 5px}
    input{width:100%;box-sizing:border-box;padding:11px 12px;border:1px solid #e3ddd3;border-radius:8px;font-size:14px;background:#faf8f4;color:#555}
    button{width:100%;margin-top:18px;padding:12px;border:none;border-radius:8px;background:#E84C5C;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
    .demo-badge{background:#fff5e6;border:1px solid #f0d9a8;color:#8a5a00;padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:14px;text-align:center}
    .hint{font-size:11px;color:#aaa;margin-top:6px}
  </style>
</head>
<body style="width:100%; margin:0; padding:0; overflow-x:hidden;">
  <div class="wrap">
    <div class="card">
      <h1>Vitaliteitsbureau-login</h1>
      <p class="sub">StressChecker Pro Event-dashboard</p>
      <div class="demo-badge">🧪 Demo &middot; vooringevuld &middot; geen echte gegevens</div>
      <form method="post" action="{{ url_for('vb_demo_dashboard') }}" autocomplete="off">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" value="janjansen@johson.com" readonly>
        <label for="password">Wachtwoord</label>
        <input type="text" id="password" name="password" value="1234569" readonly>
        <button type="submit">Inloggen</button>
        <div class="hint">Demo-account — klik op Inloggen om het voorbeeld-dashboard te bekijken.</div>
      </form>
    </div>
  </div>
</body>
</html>
