{% extends "base.html" %}
{% block title %}VB Login — StressChecker Pro Event{% endblock %}
{% block head %}
<style>
  /* VB-login binnen de Pro-app-chrome (base.html: header/logo/taalwissel + .app-main beige).
     Gecentreerde login-kaart op Pro-tokens (witte kaart radius 12 + schaduw, rood #E8344E). */
  .vb-login{max-width:380px;margin:4vh auto;width:100%}
  .vb-login .card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px}
  .vb-login h1{font-size:18px;margin:0 0 4px;color:#333}
  .vb-login p.sub{color:#888;font-size:13px;margin:0 0 18px}
  .vb-login label{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 5px}
  .vb-login input{width:100%;box-sizing:border-box;padding:11px 12px;border:2px solid #DDD5C8;border-radius:8px;font-size:14px;font-family:inherit;background:#fff}
  .vb-login input:focus{outline:none;border-color:#E8344E}
  .vb-login .err{background:#FDE8EB;border:1px solid #f5c2c2;color:#a12;padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:14px}
  .vb-login .btn-primary{margin-top:18px}
</style>
{% endblock %}
{% block content %}
  <div class="vb-login">
    <div class="card">
      <h1>Vitaliteitsbureau-login</h1>
      <p class="sub">StressChecker Pro Event-dashboard</p>
      {% if error %}<div class="err">{{ error }}</div>{% endif %}
      <form method="post" action="/vb/login" autocomplete="off">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autocomplete="off" value="">
        <label for="password">Wachtwoord</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" value="">
        <button type="submit" class="btn-primary">Inloggen</button>
      </form>
    </div>
  </div>
{% endblock %}
