{% extends "base.html" %}
{% block title %}Verificatie — VB Dashboard{% endblock %}
{% block content %}
<div style="max-width:420px;margin:40px auto;padding:0 16px;">
<div style="background:white;border-radius:14px;padding:28px 24px;box-shadow:0 2px 12px rgba(0,0,0,.08);text-align:center;">
<div style="font-size:2.5rem;margin-bottom:8px;">&#128274;</div>
<h2 style="font-size:1.2rem;font-weight:800;color:var(--red);margin:0 0 8px;">Verificatie</h2>
<p style="font-size:.85rem;color:#666;margin:0 0 20px;">
  Code gestuurd naar <strong>{{ email }}</strong>.
  <span style="display:block;font-size:.78rem;color:#999;margin-top:6px;">Geen e-mail? Kijk ook even in je <strong>spam</strong>.</span>
</p>
{% if error %}<p style="color:var(--red);font-size:.85rem;">{{ error }}</p>{% endif %}
<form method="POST">
<input type="text" name="code" inputmode="numeric" maxlength="6" autofocus placeholder="000000" style="width:100%;text-align:center;font-size:2rem;letter-spacing:.5rem;padding:12px;border:2px solid #eee;border-radius:10px;outline:none;font-family:inherit;box-sizing:border-box;">
<button type="submit" style="width:100%;margin-top:16px;padding:14px;background:var(--red);color:white;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;">Bevestigen</button>
</form>
<a href="{{ url_for('vb_login') }}" style="display:block;margin-top:16px;font-size:.8rem;color:#aaa;text-decoration:none;">Terug</a>
</div>
</div>
{% endblock %}
