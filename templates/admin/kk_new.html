{% extends "base.html" %}
{% block title %}Admin — Nieuwe Krankenkasse-licentie{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto;padding:1rem;">
  <h1 style="font-size:1.3rem;">
    <span style="background:#1565c0;color:#fff;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:10px;vertical-align:middle;margin-right:.3rem;">ADMIN</span>
    Nieuwe Krankenkasse-licentie
  </h1>

  {% if error %}
  <div class="form-error" style="background:#fdecea;color:#b71c1c;padding:.6rem .8rem;border-radius:6px;margin:1rem 0;">{{ error }}</div>
  {% endif %}

  <div class="card" style="padding:1.2rem;">
    <form method="POST" action="{{ url_for('admin_kk_new') }}">
      <input type="hidden" name="token" value="{{ token }}">

      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label" for="kk_name">Naam Krankenkasse *</label>
        <input type="text" id="kk_name" name="kk_name" class="form-input" placeholder="KKH" required>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Tier *</label>
        <div style="display:flex;gap:1rem;margin-top:.3rem;">
          <label><input type="radio" name="tier" value="kompakt" required> Kompakt (tot 1M verzekerden — &euro;1.500/jr)</label>
        </div>
        <div style="margin-top:.3rem;">
          <label><input type="radio" name="tier" value="standard" checked> Standard (1-5M verzekerden — &euro;2.500/jr)</label>
        </div>
        <div style="margin-top:.3rem;">
          <label><input type="radio" name="tier" value="premium"> Premium (&gt;5M verzekerden — &euro;4.000/jr)</label>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label" for="contact_name">Naam contactpersoon</label>
        <input type="text" id="contact_name" name="contact_name" class="form-input" placeholder="Herr/Frau Mustermann">
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label" for="contact_email">E-mail contactpersoon *</label>
        <input type="email" id="contact_email" name="contact_email" class="form-input" placeholder="kontakt@kkh.de" required>
      </div>

      <div class="form-group" style="margin-bottom:14px;">
        <label style="display:flex;align-items:center;gap:.4rem;cursor:pointer;">
          <input type="checkbox" name="send_mail" value="1">
          <span>Welkomstmail direct versturen (anders later via offices-pagina)</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary">LICENTIE AANMAKEN &#9654;</button>
    </form>
  </div>
</div>
{% endblock %}
